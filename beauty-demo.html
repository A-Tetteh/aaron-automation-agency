<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Local Beauty Salon — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fdf0f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .widget {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 600px;
    }

    .header {
      background: linear-gradient(135deg, #2a0a1f 0%, #7b2d5e 100%);
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: #f4c2d0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
    .header-text p  { font-size: 12px; opacity: 0.75; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80; border-radius: 50%;
      display: inline-block; margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e8c8d8; border-radius: 2px; }

    .bubble-row { display: flex; gap: 8px; align-items: flex-end; }
    .bubble-row.user { flex-direction: row-reverse; }

    .bubble-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    .bubble-icon.bot  { background: #fce8f0; }
    .bubble-icon.user { background: #7b2d5e; color: #fff; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .bubble.bot  { background: #fdf0f5; color: #1a0a12; border-bottom-left-radius: 4px; }
    .bubble.user { background: #7b2d5e; color: #fff; border-bottom-right-radius: 4px; }

    .bubble-time { font-size: 10px; color: #b080a0; margin-top: 4px; padding: 0 4px; }
    .bubble-row.user .bubble-time { text-align: right; }

    .typing {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px;
      background: #fdf0f5;
      border-radius: 16px; border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #c080a0; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .welcome { text-align: center; padding: 24px 16px 8px; }
    .welcome-icon { font-size: 36px; margin-bottom: 8px; }
    .welcome h2 { font-size: 15px; font-weight: 600; color: #2a0a1f; margin-bottom: 4px; }
    .welcome p  { font-size: 13px; color: #7a4060; line-height: 1.5; }

    .chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 4px 16px 0;
    }

    .chip {
      background: #fdf0f5;
      border: 1px solid #f0ccd8;
      color: #7b2d5e;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .chip:hover { background: #f8dce8; border-color: #d898b8; }

    .input-bar {
      padding: 12px 16px 16px;
      border-top: 1px solid #f5e0ea;
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }

    .input-bar textarea {
      flex: 1;
      border: 1.5px solid #f0ccd8;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none; outline: none;
      line-height: 1.4; max-height: 100px; overflow-y: auto;
      color: #1a0a12; background: #fdf8fa;
      transition: border-color 0.15s;
    }

    .input-bar textarea:focus { border-color: #7b2d5e; background: #fff; }
    .input-bar textarea::placeholder { color: #c0a0b0; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: #7b2d5e;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover   { background: #9b3d7e; }
    .send-btn:active  { transform: scale(0.93); }
    .send-btn:disabled { background: #d4a8c0; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    .bubble.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    .powered { text-align: center; font-size: 11px; color: #c8a8b8; padding-bottom: 6px; }
  </style>
</head>
<body>

<div class="widget">

  <div class="header">
    <div class="avatar">💅</div>
    <div class="header-text">
      <h1>Your Local Beauty Salon</h1>
      <p><span class="status-dot"></span>We typically reply instantly</p>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">✨</div>
      <h2>Hi there! How can we help?</h2>
      <p>Ask us about treatments, prices, bookings, or anything else you'd like to know.</p>
    </div>
  </div>

  <div class="chips" id="chips">
    <button class="chip" onclick="sendChip(this)">What treatments do you offer?</button>
    <button class="chip" onclick="sendChip(this)">How do I book an appointment?</button>
    <button class="chip" onclick="sendChip(this)">What are your prices?</button>
    <button class="chip" onclick="sendChip(this)">Do you do lash extensions?</button>
  </div>

  <div class="input-bar">
    <textarea
      id="input"
      placeholder="Type your question…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <div class="powered">Powered by AI</div>
</div>

<script>
  const WEBHOOK_URL = 'https://aarontetteh.app.n8n.cloud/webhook/business-chat';

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const chipsEl    = document.getElementById('chips');

  let isLoading = false;

  function formatTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(text, role, isError = false) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const icon = document.createElement('div');
    icon.className = `bubble-icon ${role}`;
    icon.textContent = role === 'bot' ? '💅' : '👤';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}${isError ? ' error' : ''}`;
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'bubble-time';
    time.textContent = formatTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    row.appendChild(icon);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row bot';
    row.id = 'typing-row';

    const icon = document.createElement('div');
    icon.className = 'bubble-icon bot';
    icon.textContent = '💅';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(icon);
    row.appendChild(typing);
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  function hideChips() { chipsEl.style.display = 'none'; }

  function setLoading(state) {
    isLoading = state;
    sendBtn.disabled = state;
    inputEl.disabled = state;
  }

  async function sendMessage(text) {
    const question = (text || inputEl.value).trim();
    if (!question || isLoading) return;

    hideChips();
    inputEl.value = '';
    autoResize(inputEl);
    appendMessage(question, 'user');
    setLoading(true);
    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });

      removeTyping();

      if (!res.ok) throw new Error(`Server responded with ${res.status}`);

      const data = await res.json();
      const answer = data.answer || data.message || "Sorry, I didn't get a response. Please try again.";
      appendMessage(answer, 'bot');

    } catch (err) {
      removeTyping();
      appendMessage('Something went wrong. Please check your connection and try again.', 'bot', true);
      console.error(err);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  function sendChip(btn) { sendMessage(btn.textContent); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }
</script>

</body>
</html>
